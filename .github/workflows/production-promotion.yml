name: Production Promotion Audit

on:
  workflow_dispatch:
    inputs:
      deployment_sha:
        description: 'Commit SHA to promote to production. Leave empty to use the current workflow commit.'
        required: false
      pr_number:
        description: 'Pull request number associated with the production-ready code.'
        required: false

permissions:
  contents: read
  checks: read
  statuses: read
  actions: read

jobs:
  production-promotion:
    name: Production Promotion Verification
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify AI review completed and passed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOYMENT_SHA: ${{ github.event.inputs.deployment_sha }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          python .github/scripts/verify_promotion.py

      - name: Upload production promotion audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-promotion-audit-${{ github.run_id }}
          path: production-promotion-report.json
